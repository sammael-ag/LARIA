name: LARIA IRC Bridge

on:
  workflow_dispatch: # Len na tvoj povel

permissions:
  contents: write

jobs:
  irc_listener:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run IRC Sniper
        run: |
          node -e "
          const net = require('net');
          const fs = require('fs');
          const client = net.connect(6667, 'irc.libera.chat', () => {
            client.write('NICK laria_sniper\r\n');
            client.write('USER laria_sniper 0 * :LariaBridge\r\n');
            client.write('JOIN #laria\r\n');
          });

          let messages = [];
          client.on('data', (data) => {
            const line = data.toString();
            if (line.includes('PING')) client.write('PONG ' + line.split(' ')[1] + '\r\n');
            if (line.includes('PRIVMSG #laria')) {
              const msg = line.split('PRIVMSG #laria :')[1];
              if (msg) messages.push(msg.trim());
            }
          });

          // Len 15 sekúnd - vletieť, zobrať, zmiznúť
          setTimeout(() => {
            // Ak nič nové neprišlo, necháme tam aspoň správu o spojení
            const toSave = messages.length > 0 ? messages.slice(-2) : ['Spojenie stabilné, čakám na dáta...'];
            fs.writeFileSync('messages.json', JSON.stringify({ messages: toSave }));
            process.exit(0);
          }, 15000);
          "

      - name: Commit and Push
        run: |
          git config --global user.name "Sammael-Bridge"
          git config --global user.email "bridge@laria.com"
          git add messages.json
          git commit -m "IRC Sniper Update" || exit 0
          git push
