<!DOCTYPE html>
<html lang="sk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LARIA - Profesionálna Faktúra</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <link rel="stylesheet" href="src/styles/global.css">
</head>
<body>

<div class="container">
    <h2>LARIA <span style="color:#ff00ff">Fakturant</span></h2>

    <div class="section-title">Trvalé údaje (Pamätajú sa)</div>
    <div class="field">
        <label>Dodávateľ (Tvoje údaje / Brat)</label>
        <textarea id="dodavatel" rows="4" oninput="savePersistent()" placeholder="Meno, Adresa, IČO, DIČ, Registrácia..."></textarea>
    </div>
    <div class="field">
        <label>Platobné údaje (IBAN, SWIFT)</label>
        <textarea id="banka" rows="2" oninput="savePersistent()" placeholder="IBAN: SK...\nSWIFT: ..."></textarea>
    </div>
    <div class="field">
        <label>Odberateľ (Firma)</label>
        <textarea id="odberatel" rows="4" oninput="savePersistent()" placeholder="Názov firmy, Adresa, IČO, DIČ..."></textarea>
    </div>

    <div class="section-title">Údaje faktúry (Vždy nové)</div>
    <div class="row">
        <div class="field">
            <label>Číslo faktúry / VS</label>
            <input type="text" id="vs" placeholder="napr. 2026001">
        </div>
        <div class="field">
            <label>Dátum vyhotovenia (Prázdne = Dnes)</label>
            <input type="date" id="custom_vystavenie">
        </div>
    </div>
    <div class="row">
        <div class="field">
            <label>Dátum dodania (DD.MM.RRRR)</label>
            <input type="text" id="d_dodania" placeholder="DD.MM.RRRR">
        </div>
        <div class="field">
            <label>Splatnosť (DD.MM.RRRR)</label>
            <input type="text" id="d_splatnosti" placeholder="DD.MM.RRRR">
        </div>
    </div>
    <div class="row">
        <div class="field">
             <label>KW (Týždeň)</label>
             <input type="text" id="kw" placeholder="napr. 14">
        </div>
        <div class="field">
            <label>Popis prác</label>
            <input type="text" id="popis" placeholder="napr. Stavebné práce">
        </div>
    </div>
    <div class="row">
        <div style="flex: 2;">
            <label>Suma</label>
            <input type="number" id="suma" step="0.01">
        </div>
        <div style="flex: 1;">
            <label>Mena</label>
            <select id="mena" onchange="savePersistent()">
                <option value="EUR">EUR (€)</option>
                <option value="k-ROD">k-ROD (K)</option>
                <option value="USD">USD ($)</option>
                <option value="CZK">CZK (Kč)</option>
            </select>
        </div>
    </div>

    <button onclick="generujPDF()">⬇ GENEROVAŤ PDF FAKTÚRU</button>

    <div class="footer-info">LARIA SYSTEM | 2026</div>
</div>

<script>
    // Načítanie pri štarte
    window.onload = () => {
        document.getElementById('dodavatel').value = localStorage.getItem('fa_dodavatel') || "";
        document.getElementById('banka').value = localStorage.getItem('fa_banka') || "";
        document.getElementById('odberatel').value = localStorage.getItem('fa_odberatel') || "";
        document.getElementById('mena').value = localStorage.getItem('fa_mena') || "EUR";
    };

    function savePersistent() {
        localStorage.setItem('fa_dodavatel', document.getElementById('dodavatel').value);
        localStorage.setItem('fa_banka', document.getElementById('banka').value);
        localStorage.setItem('fa_odberatel', document.getElementById('odberatel').value);
        localStorage.setItem('fa_mena', document.getElementById('mena').value);
    }

    function generujPDF() {
        // Logika pre dátum vyhotovenia
        let manualDate = document.getElementById('custom_vystavenie').value;
        let finalVystavenie;
        
        if (manualDate) {
            let parts = manualDate.split("-");
            finalVystavenie = parts[2] + "." + parts[1] + "." + parts[0];
        } else {
            finalVystavenie = new Date().toLocaleDateString('sk-SK');
        }

        const d = {
            dodavatel: document.getElementById('dodavatel').value,
            banka: document.getElementById('banka').value,
            odberatel: document.getElementById('odberatel').value,
            vs: document.getElementById('vs').value,
            kw: document.getElementById('kw').value,
            d_dodania: document.getElementById('d_dodania').value,
            d_splatnosti: document.getElementById('d_splatnosti').value,
            popis: document.getElementById('popis').value,
            suma: document.getElementById('suma').value,
            mena: document.getElementById('mena').value,
            d_vystavenia: finalVystavenie
        };

        const pdfContent = `
            <div style="width: 170mm; margin: 0 auto; padding: 10mm; font-family: Arial, sans-serif; color: #000; background: white;">
                <table style="width: 100%; border-collapse: collapse; border: 1px solid #000;">
                    <tr>
                        <td style="width: 50%; vertical-align: top; border: 1px solid #000; padding: 10px;">
                            <strong style="font-size: 11px; color: #555; text-transform: uppercase;">Dodávateľ:</strong><br>
                            <div style="white-space: pre-wrap; font-size: 13px; margin-top: 5px; line-height: 1.3;">${d.dodavatel}</div>
                        </td>
                        <td style="width: 50%; vertical-align: top; border: 1px solid #000; padding: 10px;">
                            <div style="font-size: 15px; font-weight: bold; margin-bottom: 12px;">Faktúra číslo (VS): ${d.vs}</div>
                            <strong style="font-size: 11px; color: #555; text-transform: uppercase;">Odberateľ:</strong><br>
                            <div style="white-space: pre-wrap; font-size: 13px; margin-top: 5px; line-height: 1.3;">${d.odberatel}</div>
                        </td>
                    </tr>
                    <tr>
                        <td style="border: 1px solid #000; padding: 10px; vertical-align: top;">
                            <strong style="font-size: 11px;">Platobné údaje:</strong><br>
                            <div style="white-space: pre-wrap; font-size: 12px; margin-top: 5px; line-height: 1.3;">${d.banka}</div>
                            <div style="font-size: 11px; margin-top: 8px;">Forma úhrady: Prevodný príkaz</div>
                        </td>
                        <td style="border: 1px solid #000; padding: 10px; vertical-align: top;">
                            <table style="width: 100%; font-size: 12px; line-height: 1.5;">
                                <tr><td>Dátum vyhotovenia:</td><td align="right">${d.d_vystavenia}</td></tr>
                                <tr><td>Dátum dodania:</td><td align="right">${d.d_dodania}</td></tr>
                                <tr style="font-weight: bold;"><td>Dátum splatnosti:</td><td align="right">${d.d_splatnosti}</td></tr>
                            </table>
                        </td>
                    </tr>
                </table>

                <table style="width: 100%; border-collapse: collapse; margin-top: 20px;">
                    <tr style="background: #f2f2f2; font-size: 11px;">
                        <th style="border: 1px solid #000; padding: 8px; text-align: left;">Názov položky / Popis</th>
                        <th style="border: 1px solid #000; padding: 8px; text-align: right; width: 120px;">Suma</th>
                    </tr>
                    <tr>
                        <td style="border: 1px solid #000; padding: 20px 10px; height: 350px; vertical-align: top; font-size: 14px;">
                            ${d.popis} ${d.kw ? '<br><span style="font-size: 12px; color: #555;">(Týždeň: KW ' + d.kw + ')</span>' : ''}
                        </td>
                        <td style="border: 1px solid #000; padding: 20px 10px; text-align: right; vertical-align: top; font-size: 15px; font-weight: bold;">
                            ${d.suma} ${d.mena}
                        </td>
                    </tr>
                </table>

                <div style="margin-top: 20px; text-align: right; font-size: 18px;">
                    <strong>Celkom k úhrade: ${d.suma} ${d.mena}</strong>
                </div>

                <div style="margin-top: 40px; font-size: 10px; color: #333;">
                    Dodávateľ nie je platiteľom DPH.<br>
                    Dodanie je oslobodené od dane podľa zákona o DPH.
                </div>
                
                <div style="margin-top: 80px; text-align: center; border-top: 1px solid #eee; padding-top: 10px; font-size: 9px; color: #999;">
                    Vyhotovil: Sammael & Aria Digital System
                </div>
            </div>
        `;

        const opt = {
            margin: [5, 5, 5, 5],
            filename: 'Faktura_' + d.vs + '.pdf',
            image: { type: 'jpeg', quality: 0.98 },
            html2canvas: { scale: 2, useCORS: true, scrollY: 0 },
            jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' }
        };

        html2pdf().from(pdfContent).set(opt).save();
    }
</script>

</body>
</html>
