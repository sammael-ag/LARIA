<!DOCTYPE html>
<html lang="sk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LARIA Vizitkár</title>
    <style>
        /* --- TVOJA STARÁ DOBRÁ ZÁHRADA (Dizajn zo SPDR) --- */
        :root { 
            --primary: #8fb339; /* Tá tvoja zelená */
            --bg: #fdfdfd; 
            --text: #2c3e50; 
        }
        
        body { 
            font-family: 'Segoe UI', sans-serif; 
            background: var(--bg); 
            color: var(--text); 
            margin: 0; 
            padding: 15px; 
        }

        .container { max-width: 600px; margin: auto; }

        header { 
            text-align: center; 
            padding: 20px 0; 
            border-bottom: 2px solid var(--primary); 
            margin-bottom: 20px; 
        }

        /* --- ŠTÝL VIZITIEK --- */
        .card {
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            width: 100%; 
            max-width: 600px; 
            margin: 10px auto;
            display: flex;
            flex-direction: column;
            align-items: center; 
            text-align: center;
            transition: 0.3s;
            position: relative;
            box-sizing: border-box;
        }

        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 25px rgba(0,0,0,0.15);
        }

        .card .tag {
            background: #eef2f3;
            color: var(--primary);
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 0.8em;
            font-weight: bold;
            position: absolute;
            top: 15px;
            right: 15px;
        }

        .card .name {
            font-size: 1.4em;
            font-weight: bold;
            color: #333;
            margin-top: 25px;
            margin-bottom: 5px;
        }

        .card .loc {
            font-size: 0.9em;
            color: #888;
            margin-bottom: 15px;
        }

        .popis {
            font-size: 0.95rem;
            color: #444;
            margin-bottom: 20px;
            line-height: 1.5;
            white-space: pre-line;
        }

        /* --- FILTRE A TLAČIDLÁ --- */
        .filter-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            margin-bottom: 30px;
        }

        select, #searchInput {
            width: 100%;
            max-width: 400px;
            padding: 12px 15px;
            border: 2px solid #ddd;
            border-radius: 25px;
            font-size: 16px;
            outline: none;
            background: white;
        }

        .card-actions-row {
            display: flex;
            justify-content: space-between;
            gap: 6px;
            margin-top: 15px;
            width: 100%;
        }

        .btn-action {
            flex: 1;
            display: flex;
            flex-direction: row; /* Ikonka a text vedľa seba */
            align-items: center;
            justify-content: center;
            height: 36px;       /* Pevná, nízka výška pre eleganciu */
            border-radius: 18px;
            font-size: 0.8em;
            font-weight: bold;
            text-decoration: none;
            color: white;
            transition: 0.2s;
            white-space: nowrap; /* Aby sa text zbytočne nelámal */
        }

        .btn-action span {
            margin-right: 5px; /* Medzera medzi ikonkou a textom */
            font-size: 1.1em;
        }
        #backToTop {
            position: fixed; bottom: 20px; right: 20px;
            background: var(--primary); color: white;
            border: none; padding: 10px 15px; border-radius: 50%;
            font-weight: bold; cursor: pointer; display: none;
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h2>🌿 LARIA Vizitkár</h2>
        <p style="font-size: 0.9em; color: #666;">Multidimenzionálna sieť tvorcov</p>
    </header>

    <div class="filter-container">
        <select id="categorySelect" onchange="applyFilter()">
            <option value="all">Všetky kategórie</option>
            <option value="remesla">Remeslá a materiál</option>
            <option value="sluzby">Odborné služby</option>
            <option value="duchovno">Vzdelávanie a rozvoj</option>
        </select>
        <input type="text" id="searchInput" placeholder="🔍 Hľadať mesto alebo meno..." onkeyup="applyFilter()">
    </div>

    <div id="list">
        </div>
</div>

<button onclick="window.scrollTo({top: 0, behavior: 'smooth'})" id="backToTop">↑</button>

<script>
    // --- TVOJA DATABÁZA (Záhrada) ---
    // --- TVOJA AKTUALIZOVANÁ DATABÁZA ---
    const vizitky = [
        {
            id: 1,
            meno: "Sammael Hudec",
            kat: "remesla",
            lok: "Rákoš / Revúca",
            popis: "Tesár a umelecký stolár.\nŠpecializácia na rustic, steampunk a art deco.\nVýroba svetelných žiaričov a orez stromov.",
            tel: "+421951815453", // Tvoje správne číslo
            galeria: "https://photos.app.goo.gl/pqbaoq7d7g7HkTix8" // Tvoja galéria
        }
    ];

    function render() {
        const list = document.getElementById('list');
        const search = document.getElementById('searchInput').value.toLowerCase();
        const cat = document.getElementById('categorySelect').value;

        const filtered = vizitky.filter(v => {
            const matchSearch = v.meno.toLowerCase().includes(search) || v.lok.toLowerCase().includes(search);
            const matchCat = cat === 'all' || v.kat === cat;
            return matchSearch && matchCat;
        });

        list.innerHTML = filtered.map(v => `
    <div class="card">
        <span class="tag">${v.kat}</span>
        <span class="name">${v.meno}</span>
        <span class="loc">📍 ${v.lok}</span>
        <div class="popis">${v.popis}</div>
        
        <div class="card-actions-row">
            <<a href="tel:${v.tel.replace(/\s/g, '')}" class="btn-action" style="background-color: #8bc34a;">
                <span>📞</span>Volať
            </a>
            
            <a href="https://t.me/Sammael777" target="_blank" class="btn-action" style="background-color: #0088cc;">
                <span>💬</span>Správa
            </a>
            
            <a href="${v.galeria}" target="_blank" class="btn-action" style="background-color: #ea4335;">
                <span>🖼️</span>Galéria
            </a>
        </div>
    </div>
`).join('');
    }

    function applyFilter() { render(); }
    
    window.onscroll = function() {
        document.getElementById("backToTop").style.display = 
            (document.documentElement.scrollTop > 300) ? "block" : "none";
    };

    render();
</script>

</body>
</html>
